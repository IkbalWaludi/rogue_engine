<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Web AR</title>
    <!-- Import A-Frame for 3D rendering -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <!-- Import AR.js for camera tracking and marker detection -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        /* CSS to ensure the AR camera view fills the whole screen */
        body {
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- Define the AR scene and enable tracking -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        /* Use the standard "Hiro" marker anchor */
        <a-marker preset="hiro">
            <!-- Render a spinning 3D box over the physical marker -->
            <a-box position="0 0.5 0" 
                   material="color: #4CC3D9; opacity: 0.8;"
                   animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
            </a-box>
        </a-marker>

        <!-- Define the default scene camera -->
        
    </a-scene>
</body>
</html>
